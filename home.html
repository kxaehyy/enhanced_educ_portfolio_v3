<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

  <nav class="navbar">
    <div class="logo">A<span>X</span>HIE.</div>
    
    <div class="menu-toggle" id="mobile-menu">
        <i class="fas fa-bars"></i>
    </div>

    <ul id="nav-list">
        <li><a href="home.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="portfolio.html">Portfolio</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="#" onclick="logout()" style="color: #ff4d4d;">Logout</a></li>
    </ul>
  </nav>

  <div class="main">
    <div class="info">
      <h1><span>Hi</span> Everyone! </h1>
      <h1>Wel<span>come</span> to my Port<span>folio</span></h1>
      <p><i><b>This site is where I share my journey in programming and design.<br> 
        Feel free to explore!</b></i></p>
      <a href="about.html"><b>Explore</b></a>
    </div>
  </div>

  <script>
    const menu = document.querySelector('#mobile-menu');
    const navList = document.querySelector('#nav-list');

    menu.addEventListener('click', () => {
        navList.classList.toggle('active'); 
        menu.querySelector('i').classList.toggle('fa-bars');
        menu.querySelector('i').classList.toggle('fa-times');
    });
    document.querySelectorAll('.show-more').forEach(button => {
        button.addEventListener('click', () => {
            const description = button.previousElementSibling;
            description.classList.toggle('active');
            button.textContent = description.classList.contains('active') ? 'Show Less' : 'Show More';
        });
    });
  </script>

  <script src="script.js"></script>

</body>
</html>
